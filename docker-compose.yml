services:
  mysql:
    image: mysql:8.4
    container_name: alerte-ecole-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: alerte_ecole
      MYSQL_USER: alerte
      MYSQL_PASSWORD: alerte
    ports:
      - "3307:3306"   # 3306 hôte déjà pris par un MySQL local → on expose sur 3307
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
