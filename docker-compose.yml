services:
  mysql:
    image: mysql:8.4
    container_name: alerte-ecole-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: alerte_ecole
      MYSQL_USER: alerte
      MYSQL_PASSWORD: alerte
    ports:
      - "3307:3306"   # 3306 hôte déjà pris par un MySQL local → on expose sur 3307
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: alerte-ecole-backend
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8800 --reload
    environment:
      - DATABASE_URL=mysql+mysqlconnector://alerte:alerte@mysql:3306/alerte_ecole
    ports:
      - "8800:8800"
    volumes:
      - ./backend:/app
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: alerte-ecole-frontend
    restart: unless-stopped
    ports:
      - "3000:8081"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - EXPO_USE_METRO_WORKSPACE_ROOT=1
      - REACT_NATIVE_PACKAGER_HOSTNAME=192.168.1.4
    depends_on:
      - backend

volumes:
  mysql_data:
